replicaCount: 2
image:
  repository: purvakdevops/demo-app
  pullPolicy: IfNotPresent
  tag: "main"
serviceAccount:
  create: false
  annotations: {}
  name: ""
service:
  type: NodePort
  port: 3000
  nodePort: 30080
ingress:
  enabled: false
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
